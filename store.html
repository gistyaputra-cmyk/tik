<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-tech">

<div class="tech-overlay"></div>

<div class="navbar">
    <span onclick="showSection('about')">Tentang Kami</span>
    <span onclick="showSection('market')">Marketplace</span>
    <span onclick="goJual()">Jual Barang</span>
    <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- ABOUT -->
<div id="about" class="section">
    <h2>Tentang Kami</h2>
    <p>Kami adalah platform jual beli digital modern.</p>
    <p>Tujuan kami mempermudah transaksi digital secara cepat.</p>
    <p>Latar belakang kami adalah perkembangan ekonomi digital.</p>
</div>

<!-- MARKET -->
<div id="market" class="section" style="display:none;">
    <h2>Marketplace</h2>

    <div class="products">

        <div class="product" onclick="showProduct('Ebook Premium')">
            <p>Ebook Premium</p>
        </div>

        <div class="product" onclick="showProduct('Template Website')">
            <p>Template Website</p>
        </div>

        <div class="product" onclick="showProduct('Aplikasi Kasir')">
            <p>Aplikasi Kasir</p>
        </div>

        <div class="product" onclick="showProduct('Desain Logo')">
            <p>Desain Logo</p>
        </div>

    </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
    <div class="popup-content">
        <h3 id="productName"></h3>
        <button onclick="closePopup()">Tutup</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>

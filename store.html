<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-tech">

<div class="navbar">
    <span onclick="showSection('about')">Tentang</span>
    <span onclick="showSection('market')">Marketplace</span>
    <span onclick="goJual()">Jual</span>
    <button class="logout" onclick="logout()">Logout</button>
</div>

<div id="about" class="section">
    <h2>Tentang Kami</h2>
    <p>Platform jual beli digital modern.</p>
    <p>Tujuan: mempermudah transaksi.</p>
    <p>Latar belakang: perkembangan digital.</p>
</div>

<div id="market" class="section" style="display:none;">
    <h2>Marketplace</h2>

    <div class="products">
        <div class="product" onclick="showProduct('Ebook Premium')">Ebook Premium</div>
        <div class="product" onclick="showProduct('Template Website')">Template Website</div>
        <div class="product" onclick="showProduct('Aplikasi Kasir')">Aplikasi Kasir</div>
        <div class="product" onclick="showProduct('Desain Logo')">Desain Logo</div>
    </div>
</div>

<div id="popup" class="popup">
    <div class="popup-content">
        <h3 id="productName"></h3>
        <button onclick="closePopup()">Tutup</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
